# 注意: MySQL、Redis、IoTDB 已独立部署，不需要在此定义
# MySQL:  /home/jetson/mysql/docker-compose.yml
# Redis:  /home/jetson/redis/docker-compose.yml
# IoTDB:  /home/jetson/iotdb/docker-compose-standalone.yml

services:
  # ========== RTSP -> WebRTC 低延迟网关 ==========
  webrtc-streamer:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/mpromonet/webrtc-streamer:master-arm64-linuxarm64
    container_name: dam-webrtc-streamer
    restart: unless-stopped
    platform: linux/arm64
    # host 网络让 WebRTC 正确发布 Jetson 的 LAN ICE 候选；HTTP 信令只监听
    # 回环地址，由 Python 后端做认证代理，避免暴露 RTSP 凭据和任意拉流接口。
    network_mode: host
    command:
      - -H
      - 127.0.0.1:8002
      - -s-
      - -R
      - 50000:50100
      # 海康子码流建议设为 H.264；透传编码可显著降低 Jetson CPU 和延迟。
      - -o
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8002"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ========== 前端（Vite 开发服务器） ==========
  dam-frontend:
    build:
      context: ./dam-frontend
      dockerfile: Dockerfile
    container_name: dam-frontend
    restart: unless-stopped
    # 挂载源码目录，修改后 docker compose restart dam-frontend 即可生效
    volumes:
      - ./dam-frontend/src:/app/src
      - ./dam-frontend/public:/app/public
      - ./dam-frontend/index.html:/app/index.html
      - ./dam-frontend/vite.config.js:/app/vite.config.js
    environment:
      TZ: Asia/Shanghai
    network_mode: host

  # ========== Python后端（一体化服务） ==========
  dam-server-python:
    build:
      context: ./dam-ai-service
      dockerfile: Dockerfile
    container_name: dam-server-python
    restart: unless-stopped
    depends_on:
      webrtc-streamer:
        condition: service_healthy
    # dai: YOLO 使用 Jetson CUDA；NVIDIA 官方要求 GPU 容器启用 nvidia runtime。
    runtime: nvidia
    healthcheck:
      test: ["CMD", "python", "/app/scripts/check_history_health.py", "--max-queue-age", "120", "--max-rollup-lag", "10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    # 挂载源码目录，修改后只需 docker compose restart 即可生效
    volumes:
      - ./dam-ai-service:/app
      # 挂载 Jetson 平台工具和设备树，用于读取 GPU/温度/功耗
      - /usr/bin/tegrastats:/usr/bin/tegrastats:ro
      - /usr/sbin/nvidia-smi:/usr/sbin/nvidia-smi:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu/nvidia:ro
      - /proc/device-tree:/proc/device-tree:ro
      # 挂载 YOLO 模型权重目录
      - /home/jetson/wh_test/roboflow/runs:/models/runs:ro
    environment:
      # vLLM 视觉模型
      VLLM_QWEN3VL_URL: http://localhost:8000
      # IoTDB
      IOTDB_HOST: 127.0.0.1
      IOTDB_PORT: 6667
      # MySQL
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: dam_system
      # Redis 缓存
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: redis
      # JWT —— 必须设置为强随机字符串（至少 32 字符），否则服务无法启动
      # 生成方法: python3 -c "import secrets; print(secrets.token_urlsafe(48))"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_SECONDS: "86400"
      # 默认管理员（仅在首次启动且用户不存在时创建）
      # 密码必须设置，否则服务无法启动
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_REALNAME: "管理员"
      # YOLO 目标检测模型
      YOLO_MODEL_PATH: /models/runs/yolo26x_continue/weights/best.pt
      YOLO_CONFIDENCE: "0.5"
      YOLO_IOU: "0.45"
      # dai: 未接入摄像头时保持为空；接入后在 .env 中填写真实海康地址。
      # 多路模式可改用 CAMERA_CONFIGS_JSON，格式见 README 的摄像头章节。
      CAMERA_RTSP_URL: "${CAMERA_RTSP_URL:-}"
      CAMERA_SOURCE: "${CAMERA_SOURCE:-}"
      CAMERA_CONFIGS_JSON: "${CAMERA_CONFIGS_JSON:-}"
      CAMERA_ID: "${CAMERA_ID:-camera_001}"
      CAMERA_NAME: "${CAMERA_NAME:-主摄像头}"
      CAMERA_AUTO_START: "${CAMERA_AUTO_START:-true}"
      CAMERA_DETECTION_FPS: "${CAMERA_DETECTION_FPS:-5}"
      CAMERA_JPEG_QUALITY: "${CAMERA_JPEG_QUALITY:-80}"
      # WebRTC Streamer 仅监听宿主机回环地址，信令通过后端认证代理。
      WEBRTC_STREAMER_URL: "${WEBRTC_STREAMER_URL:-http://127.0.0.1:8002}"
      WEBRTC_STREAM_OPTIONS: "${WEBRTC_STREAM_OPTIONS:-rtptransport=tcp&timeout=10}"
      MAX_VIDEO_SIZE_MB: "${MAX_VIDEO_SIZE_MB:-200}"
      MAX_VIDEO_DURATION_SECONDS: "${MAX_VIDEO_DURATION_SECONDS:-600}"
      VIDEO_DETECTION_FPS: "${VIDEO_DETECTION_FPS:-2}"
    devices:
      # dai: 海康网络摄像头不需要设备映射；USB/UVC 摄像头接入 Jetson
      # 时，在 .env 同时设置 CAMERA_DEVICE=/dev/video0 和 CAMERA_SOURCE=/dev/video0。
      - "${CAMERA_DEVICE:-/dev/null}:${CAMERA_DEVICE:-/dev/null}"
      - "/dev/ttyCH341USB0:/dev/ttyCH341USB0"
      - "/dev/ttyCH341USB1:/dev/ttyCH341USB1"
      - "/dev/ttyCH341USB2:/dev/ttyCH341USB2"
      - "/dev/ttyCH341USB3:/dev/ttyCH341USB3"
    network_mode: host

  # ========== 轻量级模型库服务 ==========
  dam-model-library:
    build:
      context: ./dam-model-library
      dockerfile: Dockerfile
    container_name: dam-model-library
    restart: unless-stopped
    # 挂载源码目录和 docker.sock（操作宿主机 Docker）
    volumes:
      - ./dam-model-library:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # MySQL
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: dam_system
    network_mode: host

  # ========== DAM 工作流生成服务 ==========
  dam-workflow:
    build:
      context: ./dam-workflow
      dockerfile: Dockerfile
    container_name: dam-workflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # 挂载源码目录，修改后只需 docker compose restart 即可生效
    volumes:
      - ./dam-workflow:/app
    environment:
      # MySQL（模型库数据库）
      MODEL_REGISTRY_DB_HOST: 127.0.0.1
      MODEL_REGISTRY_DB_PORT: "3306"
      MODEL_REGISTRY_DB_USER: root
      MODEL_REGISTRY_DB_PASSWORD: root
      MODEL_REGISTRY_DB_NAME: dam_system
      # 模型库 API
      MODEL_REGISTRY_API_BASE: http://127.0.0.1:5001
      # 服务配置
      HOST: "0.0.0.0"
      PORT: "5002"
    network_mode: host
